<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XatSpace - Gabriel Leandro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        /* Variável central que controla o tema */
        :root {
            --main-color: #00f2ff; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
            cursor: default;
        }

        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- TELA DE ENTRADA --- */
        #login-screen {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
            background: radial-gradient(circle at center, #000814 0%, #000000 100%);
        }

        .login-box {
            background: rgba(5, 5, 15, 0.85); padding: 50px; border-radius: 20px;
            border: 2px solid var(--main-color); text-align: center;
            backdrop-filter: blur(15px); 
            box-shadow: 0 0 50px var(--main-color);
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        input[type="password"] {
            padding: 12px; border-radius: 8px; border: 1px solid var(--main-color);
            outline: none; background: rgba(0, 0, 0, 0.8); color: var(--main-color);
            margin-bottom: 20px; text-align: center; font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-enter {
            padding: 12px 40px; background: var(--main-color); color: #000;
            border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-weight: 700; text-transform: uppercase;
            box-shadow: 0 0 20px var(--main-color);
            transition: 0.3s;
        }

        /* --- BOTÕES DE FERRAMENTAS --- */
        #ui-tools {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000001;
            display: none; gap: 10px; align-items: center;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.9); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 10px 15px; border-radius: 5px;
            cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 12px;
            transition: 0.3s; font-weight: bold;
        }
        .tool-btn:hover { background: var(--main-color); color: #000; }

        #visit-counter {
            background: rgba(0, 0, 0, 0.9); border: 1px solid var(--main-color);
            padding: 6px 12px; border-radius: 4px; display: flex;
            flex-direction: column; align-items: center; transition: 0.5s;
        }

        /* --- SIDEBAR E CONTEÚDO --- */
        .sidebar {
            width: 320px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 25px; text-align: center; backdrop-filter: blur(10px);
            transition: border-color 0.5s;
        }

        .profile-pic {
            width: 180px; height: 180px; border-radius: 20px;
            border: 3px solid var(--main-color); box-shadow: 0 0 25px var(--main-color);
            object-fit: cover; margin-bottom: 20px; transition: 0.5s;
        }

        .animated-gradient-text {
            background: linear-gradient(to right, var(--main-color), #ffffff, var(--main-color));
            background-size: 200% auto; color: transparent;
            -webkit-background-clip: text; background-clip: text;
            animation: gradientShift 3s linear infinite;
        }

        @keyframes gradientShift { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .menu-btn {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: 2px solid var(--main-color); color: var(--main-color); cursor: pointer;
            border-radius: 10px; font-family: 'Orbitron', sans-serif; transition: 0.3s;
        }
        .menu-btn:hover { background: var(--main-color); color: #000; }

        .slide-img {
            position: absolute; width: 280px; height: 380px;
            object-fit: cover; border-radius: 15px; border: 2px solid var(--main-color);
            box-shadow: 0 0 30px var(--main-color); transition: all 0.8s ease-in-out; opacity: 0;
        }

        .player-card { margin-top: 30px; background: rgba(5, 5, 15, 0.9); padding: 15px; border-radius: 15px; border: 1px solid var(--main-color); transition: 0.5s; }
        .track-info { font-size: 0.65rem; color: var(--main-color); margin-bottom: 10px; }
        .progress-bar { width: 0%; height: 100%; background: var(--main-color); box-shadow: 0 0 8px var(--main-color); }

        #content-right {
            flex: 1; background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color); border-radius: 25px;
            padding: 30px; display: none; overflow-y: auto;
            position: absolute; right: 40px; top: 40px; bottom: 40px; left: 400px; z-index: 60;
            transition: border-color 0.5s;
        }

        #main-profile { display: none; opacity: 0; z-index: 50; position: relative; display: flex; height: 100vh; padding: 40px; gap: 40px; transition: opacity 1.5s; }
    </style>
</head>
<body onload="init()">

    <canvas id="star-canvas"></canvas>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--main-color);">LOGIN</h2>
            <input type="password" id="passInput" placeholder="SENHA">
            <br>
            <button class="btn-enter" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="ui-tools">
        <button class="tool-btn" onclick="proximaCor()">🎨 COR</button>
        <div id="visit-counter">
            <span style="color: var(--main-color); font-size: 8px; letter-spacing: 1px;">VISITAS</span>
            <span id="count-number" style="color: #fff; font-size: 18px; font-family: monospace;">...</span>
        </div>
    </div>

    <div id="main-profile">
        <div class="sidebar">
            <img src="https://i.imgur.com/Ip2Bdxv.png" class="profile-pic">
            <h2 class="animated-gradient-text" style="font-size: 1.2rem;">Gabriel Leandro</h2>
            <button class="menu-btn" onclick="openRight('sobre')">SOBRE MIM</button>
            <button class="menu-btn" onclick="openRight('amigos')">AMIGOS</button>
            <button class="menu-btn" onclick="openRight('fotos')">FOTOS</button>

            <div class="player-card">
                <div class="track-info" id="trackName">Carregando...</div>
                <div class="progress-container" onclick="seek(event)" style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:15px; cursor:pointer;">
                    <div class="progress-bar" id="progBar"></div>
                </div>
                <div style="display:flex; justify-content:space-around; margin-bottom:10px;">
                    <button class="btn-enter" style="padding:5px 10px;" onclick="prevTrack()">⏮</button>
                    <button class="btn-enter" style="padding:5px 10px;" id="playBtn" onclick="togglePlay()">⏸</button>
                    <button class="btn-enter" style="padding:5px 10px;" onclick="nextTrack()">⏭</button>
                </div>
                <audio id="bgMusic" loop ontimeupdate="updateProgress()"></audio>
            </div>
        </div>

        <div class="slider-container" id="center-slider" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <h3 class="animated-gradient-text" style="margin-bottom:30px; letter-spacing:5px;">PROJETOS & DESTAQUES</h3>
            <div class="slideshow" id="slide-wrap" style="width:100%; height:400px; position:relative; perspective:1000px; display:flex; justify-content:center; align-items:center;"></div>
        </div>

        <div id="content-right">
            <div class="header-right" style="display:flex; flex-direction:column; align-items:flex-start; margin-bottom:20px;">
                <button class="btn-enter" style="padding:8px 15px;" onclick="closeRight()">← VOLTAR</button>
                <h2 id="right-title" class="animated-gradient-text" style="padding-bottom:10px; width:100%; margin-top:20px;"></h2>
            </div>
            <div id="right-body"></div>
        </div>
    </div>

    <script>
        const ID_VISITAS = "perfil_gabriel_2026_unique";
        // Ciclo de cores: Azul (padrão), Vermelho, Amarelo, Verde, Rosa, Laranja, Branco
        const listaCores = ["#00f2ff", "#ff0000", "#ffff00", "#00ff00", "#ff00ff", "#ff8800", "#ffffff"];
        let indiceCor = 0;

        function proximaCor() {
            indiceCor = (indiceCor + 1) % listaCores.length;
            document.documentElement.style.setProperty('--main-color', listaCores[indiceCor]);
        }

        const fotosGaleria = ["https://i.imgur.com/Ip2Bdxv.png", "https://i.imgur.com/7rKeKT8.png", "https://i.imgur.com/Bx7jSbA.png", "https://i.imgur.com/HhypJpx.png", "https://i.imgur.com/sc5uVGA.png", "https://i.imgur.com/ipooBns.png", "https://i.imgur.com/pTlq477.png"];
        const playlist = [
            { name: "Bon Jovi - Livin on a Prayer", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=cfea76fj&dl=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=b5bj4smr&dl=1" },
            { name: "Eminem - You Dont Know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=tawfqj0e&dl=1" }
        ];
        
        let stars = [], currentTrack = 0;
        const audio = document.getElementById('bgMusic');

        function init() { startStars(); setupSlider(); audio.src = playlist[currentTrack].url; document.getElementById('trackName').innerText = playlist[currentTrack].name; }

        async function carregarContadores() {
            try {
                const resV = await fetch(`https://api.counterapi.dev/v1/wrs-galeria/${ID_VISITAS}/up`);
                const dataV = await resV.json();
                document.getElementById('count-number').innerText = dataV.count || dataV.value;
            } catch(e) { document.getElementById('count-number').innerText = "1"; }
        }

        function setupSlider() {
            const wrap = document.getElementById('slide-wrap');
            fotosGaleria.forEach(src => { const img = document.createElement('img'); img.src = src; img.className = 'slide-img'; wrap.appendChild(img); });
            let idx = 0; const slides = document.querySelectorAll('.slide-img');
            setInterval(() => {
                slides.forEach(s => s.className = 'slide-img');
                if(slides[idx]) {
                    slides[idx].classList.add('active');
                    slides[(idx-1+slides.length)%slides.length].classList.add('prev');
                    slides[(idx+1)%slides.length].classList.add('next');
                    idx = (idx+1)%slides.length;
                }
            }, 3000);
        }

        function togglePlay() { audio.paused ? (audio.play(), document.getElementById('playBtn').innerText="⏸") : (audio.pause(), document.getElementById('playBtn').innerText="▶"); }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(); }
        function loadTrack() { audio.src = playlist[currentTrack].url; document.getElementById('trackName').innerText = playlist[currentTrack].name; audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        function updateProgress() { document.getElementById('progBar').style.width = (audio.currentTime / audio.duration) * 100 + "%"; }
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }

        function openRight(mode) {
            const body = document.getElementById('right-body');
            const title = document.getElementById('right-title');
            document.getElementById('content-right').style.display = "block";
            document.getElementById('center-slider').style.visibility = "hidden";
            if(mode==='sobre') { title.innerText = "SOBRE MIM"; body.innerHTML = `<div style="color:var(--main-color)">Vendo Gifs, Pcback, Pstyle e Fundos para XAT - Married Mnna ❤️</div>`; }
            else if(mode==='fotos') { title.innerText = "FOTOS"; body.innerHTML = fotosGaleria.map(s => `<img src="${s}" style="width:100px; margin:5px; border:1px solid var(--main-color)">`).join(''); }
            else { title.innerText = "AMIGOS"; body.innerHTML = `<div style="color:var(--main-color)">• Marbella • Gold • Venon • Gothica</div>`; }
        }

        function closeRight() { document.getElementById('content-right').style.display='none'; document.getElementById('center-slider').style.visibility="visible"; }

        function startStars() {
            const canvas = document.getElementById('star-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2, speed:Math.random()*0.2, op:Math.random(), ts:Math.random()*0.05});
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stars.forEach(s => {
                    s.op += s.ts; if(s.op>1 || s.op<0) s.ts=-s.ts;
                    ctx.fillStyle=`rgba(255,255,255,${Math.abs(s.op)})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
                    s.y-=s.speed; if(s.y<0) s.y=canvas.height;
                });
                requestAnimationFrame(anim);
            } anim();
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1009") {
                document.getElementById('login-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('main-profile').style.display='flex';
                    document.getElementById('ui-tools').style.display='flex';
                    carregarContadores();
                    setTimeout(() => { document.getElementById('main-profile').style.opacity='1'; audio.play(); }, 50);
                }, 1000);
            } else alert("Senha incorreta!");
        }
    </script>
</body>
</html>
